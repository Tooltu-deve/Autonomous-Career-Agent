services:
  # ===== Infrastructure =====
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ===== Application services =====
  api-gateway:
    build: ./services/api-gateway
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - profile-service

  auth-service:
    build: ./services/auth-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  profile-service:
    build: ./services/profile-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  scraper-service:
    build: ./services/scraper-service
    env_file: .env
    depends_on:
      - rabbitmq
      - postgres

  cv-agent-service:
    build: ./services/cv-agent-service
    env_file: .env
    depends_on:
      - rabbitmq
      - qdrant

  ats-agent-service:
    build: ./services/ats-agent-service
    env_file: .env
    depends_on:
      - rabbitmq
      - postgres

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  qdrant_storage:
  rabbitmq_data:
